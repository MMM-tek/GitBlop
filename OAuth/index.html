<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Authenticating...</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #fafafa; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #0095f6; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const githubCode = urlParams.get('code');

        if (githubCode) {
            // Save session data
            localStorage.setItem('gitblop_session', 'active');
            localStorage.setItem('gitblop_token', githubCode);

            // Instant redirect to the main feed
            window.location.href = "http://mmm-tek.github.io/GitBlop"; 
        } else {
            window.location.href = "http://mmm-tek.github.io/GitBlop";
        }
    </script>
</body>
</html>
