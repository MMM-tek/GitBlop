<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitBlop - Login</title>
    <style>
        body { font-family: sans-serif; background-color: #fafafa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; border: 1px solid #dbdbdb; padding: 40px; width: 300px; text-align: center; }
        .logo { font-size: 35px; font-weight: bold; margin-bottom: 20px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .btn-git { background-color: #24292e; color: white; padding: 12px; text-decoration: none; border-radius: 5px; display: block; font-weight: bold; margin-top: 20px; }
        .btn-git:hover { background-color: #444d56; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">Blophub</div>
        <p>Inicia sesión para ver las fotos y peticiones.</p>
        <!-- RECUERDA: Cambia TU_CLIENT_ID por el que saques de GitHub -->
        <a href="https://github.com" class="btn-git">Entrar con GitHub</a>
    </div>
</body>
</html>
