<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GitBlop - Login</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #fafafa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; border: 1px solid #dbdbdb; padding: 40px; width: 350px; text-align: center; }
        .logo { font-size: 32px; font-weight: bold; margin-bottom: 20px; }
        .btn-github { background: #24292e; color: white; padding: 12px; text-decoration: none; border-radius: 6px; display: block; font-weight: 600; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">GitBlop</div>
        <p>Log in to see photos and requests.</p>
        <a href="https://github.com" class="btn-github">
            Login with GitHub
        </a>
    </div>
</body>
</html>
