<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GitBlop - Home</title>
    <style>
        body { font-family: sans-serif; background: #fafafa; margin: 0; }
        nav { background: white; border-bottom: 1px solid #dbdbdb; padding: 15px 10%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; }
        .container { max-width: 935px; margin: 30px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px; }
        .post { aspect-ratio: 1/1; background: #efefef; border: 1px solid #dbdbdb; }
        .post img { width: 100%; height: 100%; object-fit: cover; }
        .btn-logout { background: none; border: none; color: #ed4956; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <script>
        // Security Check: If no session, boot to index
        if (localStorage.getItem('gitblop_session') !== 'active') {
            window.location.href = "index.html";
        }
    </script>

    <nav>
        <div style="font-size: 24px; font-weight: bold;">GitBlop</div>
        <button class="btn-logout" onclick="logout()">Logout</button>
    </nav>

    <div class="container">
        <div class="grid">
        </div>
    </div>

    <script>
        function logout() {
            localStorage.clear();
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
