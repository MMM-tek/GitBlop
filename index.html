<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitBlop - Home</title>
    <style>
        body { font-family: sans-serif; background-color: #fafafa; margin: 0; }
        nav { background: white; border-bottom: 1px solid #dbdbdb; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; }
        .container { max-width: 900px; margin: 20px auto; padding: 0 10px; }
        
        /* La Magia de Instagram: La Cuadrícula */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); /* 3 columnas */
            gap: 20px; 
        }
        .post { background: #eee; aspect-ratio: 1 / 1; position: relative; overflow: hidden; cursor: pointer; }
        .post img { width: 100%; height: 100%; object-fit: cover; }
        
        .post:hover::after {
            content: "💬 ❤️"; /* Simula interacción */
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3); color: white; display: flex; justify-content: center; align-items: center; font-size: 20px;
        }

        @media (max-width: 600px) { .grid { gap: 3px; } } /* En móvil se ve más pegado */
    </style>
</head>
<body>

<nav>
    <div style="font-size: 20px; font-weight: bold;">Blophub</div>
    <input type="text" placeholder="Buscar">
    <div><strong>@usuario</strong></div>
</nav>

<div class="container">
    <div class="grid">

    </div>
</div>

</body>
</html>
